<!DOCTYPE html> <!--indica que é um documento em html5-->
<html lang="pt-br"> <!--indica qual será o idioma do site-->
<head> <!--cabeça, parte de configurações do site-->
    <meta charset="UTF-8"> <!--padrão de codificação de caracteres que suporta acentuação-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--vai ocupar 100% da tela disponível dada pelo navegador-->
    <title>Meu primeiro exercício</title> <!--título do site-->
</head>
<body> <!--corpo, parte de conteúdo do site-->
    <h1>Olá, Mundo!</h1> <!--título de nível 1-->
    <hr> <!--linha horizontal-->
    <p>Esse é o meu primeiro documento HTML! Estou muito feliz!</p> <!--parágrafo-->
    <p>Este é um momento único! Estou criando um site!</p>    
</body>
</html>
